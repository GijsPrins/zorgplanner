<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zorgplanner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="access-shell" id="accessShell" aria-labelledby="accessTitle">
      <form class="access-panel" id="accessForm">
        <p class="eyebrow">Besloten planning</p>
        <h1 id="accessTitle">Voer het gedeelde wachtwoord in</h1>
        <p class="access-copy">
          Deze familielink is afgeschermd. Gebruik het wachtwoord dat bij deze
          planning hoort.
        </p>
        <label class="field">
          <span>Wachtwoord</span>
          <input
            id="passwordInput"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>
        <p
          class="access-message"
          id="accessMessage"
          role="status"
          aria-live="polite"
        ></p>
        <button class="primary-button" id="accessSubmit" type="submit">
          Planner openen
        </button>
      </form>
    </section>

    <main class="app-shell" id="appShell" data-page="appointments" hidden>
      <header class="app-header">
        <div>
          <h1>Afspraken</h1>
          <p class="app-sub">
            <span id="upcomingCount">0</span> komend ·
            <span id="pendingCount">0</span> reacties nodig
          </p>
        </div>
        <a class="mama-link" href="mama.html">Voor mama</a>
      </header>

      <div class="filters" role="group" aria-label="Filter afspraken">
        <button class="filter-pill active" data-filter="upcoming" type="button">
          Komend
        </button>
        <button class="filter-pill" data-filter="history" type="button">
          Geschiedenis
        </button>
        <button class="filter-pill" data-filter="all" type="button">Alle</button>
        <button class="filter-pill" data-filter="period" type="button">
          Periode
        </button>
      </div>

      <div class="period-filter" id="periodFilter" hidden>
        <label class="field">
          <span>Van</span>
          <input id="periodStartInput" name="periodStart" type="date" />
        </label>
        <label class="field">
          <span>Tot</span>
          <input id="periodEndInput" name="periodEnd" type="date" />
        </label>
        <button class="link-button" id="clearPeriodButton" type="button">
          Wis periode
        </button>
      </div>

      <div class="appointment-list" id="appointmentList"></div>

      <button class="fab" id="newAppointmentButton" type="button">
        + Nieuwe afspraak
      </button>

      <nav class="tab-bar" aria-label="Beheer">
        <a class="tab active" href="index.html" aria-current="page">
          <span class="tab-icon" aria-hidden="true">▦</span>Afspraken
        </a>
        <a class="tab" href="mensen.html">
          <span class="tab-icon" aria-hidden="true">☺</span>Mensen
        </a>
      </nav>
    </main>

    <form class="edit-screen" id="appointmentForm" aria-label="Afspraak bewerken">
      <header class="edit-header">
        <button class="back-button" id="closeEditorButton" type="button">
          ‹ Terug
        </button>
        <h2 id="formTitle">Nieuwe afspraak</h2>
      </header>

      <div class="edit-scroll">
        <input id="appointmentId" type="hidden" />

        <p class="form-section">Wanneer</p>
        <div class="form-group">
          <label class="field">
            <span>Type afspraak</span>
            <select id="titleInput" name="title" required>
              <option value="" disabled selected>Kies een type</option>
              <option value="Behandeling">Behandeling</option>
              <option value="Controle">Controle</option>
              <option value="Intake">Intake</option>
              <option value="Onderzoek">Onderzoek</option>
              <option value="Telefonisch consult">Telefonisch consult</option>
              <option value="Uitslag">Uitslag</option>
            </select>
          </label>
          <label class="field">
            <span>Datum</span>
            <input id="dateInput" name="date" type="date" required />
          </label>
          <label class="field">
            <span>Tijd</span>
            <input id="timeInput" name="time" type="time" />
          </label>
        </div>

        <p class="form-section">Waar</p>
        <div class="form-group">
          <label class="field">
            <span>Ziekenhuis</span>
            <select id="hospitalInput" name="hospital" required>
              <option value="" disabled selected>Kies een ziekenhuis</option>
              <option value="Antoni van Leeuwenhoek">
                Antoni van Leeuwenhoek
              </option>
              <option value="St. Antonius Leidsche Rijn">
                St. Antonius Leidsche Rijn
              </option>
              <option value="St. Antonius Nieuwegein">
                St. Antonius Nieuwegein
              </option>
              <option value="UMCU">UMCU</option>
            </select>
          </label>
          <label class="field">
            <span>Locatie of route</span>
            <input id="locationInput" name="location" type="text" />
          </label>
          <label class="field">
            <span>Behandelaar</span>
            <input id="doctorInput" name="doctor" type="text" />
          </label>
          <label class="field">
            <span>Waarom is deze afspraak?</span>
            <input id="reasonInput" name="reason" type="text" />
          </label>
        </div>

        <p class="form-section">Wie gaat mee?</p>
        <div class="form-group attendance-editor" id="attendanceEditor"></div>

        <p class="form-section">Notities</p>
        <div class="form-group">
          <label class="field">
            <span>Praktische notities</span>
            <textarea id="notesInput" name="notes" rows="3"></textarea>
          </label>
        </div>

        <button class="delete-link" id="deleteAppointmentButton" type="button" hidden>
          Afspraak verwijderen
        </button>
      </div>

      <div class="savebar">
        <button class="save-button" type="submit">Opslaan</button>
      </div>
    </form>

    <template id="appointmentTemplate">
      <article class="appointment-card" tabindex="0" role="button">
        <p class="when-line"></p>
        <h3></h3>
        <p class="place-line"></p>
        <p class="doctor-line"></p>
        <div class="card-divider"></div>
        <div class="chips"></div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
