<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zorgplanner mensen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="access-shell" id="accessShell" aria-labelledby="accessTitle">
      <form class="access-panel" id="accessForm">
        <p class="eyebrow">Besloten planning</p>
        <h1 id="accessTitle">Voer het gedeelde wachtwoord in</h1>
        <label class="field">
          <span>Wachtwoord</span>
          <input id="passwordInput" name="password" type="password" required />
        </label>
        <p class="access-message" id="accessMessage" role="status"></p>
        <button class="primary-button" id="accessSubmit" type="submit">
          Planner openen
        </button>
      </form>
    </section>

    <main class="app-shell" id="appShell" data-page="people" hidden>
      <header class="app-header">
        <div>
          <h1>Mensen</h1>
          <p class="app-sub"><span id="peopleCount">0</span> familieleden</p>
        </div>
        <a class="mama-link" href="mama.html">Voor mama</a>
      </header>

      <form class="person-form" id="personForm">
        <input
          id="personNameInput"
          name="personName"
          type="text"
          placeholder="Naam, bijv. Marieke"
          aria-label="Naam toevoegen"
        />
        <button class="add-button" type="submit">Toevoegen</button>
      </form>

      <section class="people-list" id="peopleList" aria-label="Familieleden"></section>

      <nav class="tab-bar" aria-label="Beheer">
        <a class="tab" href="index.html">
          <span class="tab-icon" aria-hidden="true">▦</span>Afspraken
        </a>
        <a class="tab active" href="mensen.html" aria-current="page">
          <span class="tab-icon" aria-hidden="true">☺</span>Mensen
        </a>
      </nav>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
