<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zorgplanner mensen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="access-shell" id="accessShell" aria-labelledby="accessTitle">
      <form class="access-panel" id="accessForm">
        <p class="eyebrow">Besloten planning</p>
        <h1 id="accessTitle">Voer het gedeelde wachtwoord in</h1>
        <label>
          Wachtwoord
          <input id="passwordInput" name="password" type="password" required />
        </label>
        <p class="access-message" id="accessMessage" role="status"></p>
        <button class="primary-button" id="accessSubmit" type="submit">
          Planner openen
        </button>
      </form>
    </section>

    <main class="planner-shell" id="appShell" data-page="people" hidden>
      <header class="app-header">
        <div>
          <p class="eyebrow">Familieplanning</p>
          <h1>Mensen</h1>
        </div>
        <a class="reader-link" href="mama.html">Voor mama</a>
      </header>

      <nav class="app-nav" aria-label="Beheer">
        <a href="index.html">Overzicht</a>
        <a href="afspraken.html">Afspraken</a>
        <a class="active" href="mensen.html">Mensen</a>
      </nav>

      <section class="section-header">
        <div>
          <p class="eyebrow">Beheer</p>
          <h2>Familieleden</h2>
        </div>
      </section>

      <form class="add-person-panel" id="personForm">
        <label>
          Naam toevoegen
          <input
            id="personNameInput"
            name="personName"
            type="text"
            placeholder="Bijv. Marieke"
          />
        </label>
        <button class="primary-button" type="submit">Toevoegen</button>
      </form>

      <section class="people-list-panel" id="peopleList"></section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
