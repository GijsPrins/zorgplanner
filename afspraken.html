<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zorgplanner afspraken</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="access-shell" id="accessShell" aria-labelledby="accessTitle">
      <form class="access-panel" id="accessForm">
        <p class="eyebrow">Besloten planning</p>
        <h1 id="accessTitle">Voer het gedeelde wachtwoord in</h1>
        <label>
          Wachtwoord
          <input id="passwordInput" name="password" type="password" required />
        </label>
        <p class="access-message" id="accessMessage" role="status"></p>
        <button class="primary-button" id="accessSubmit" type="submit">
          Planner openen
        </button>
      </form>
    </section>

    <main class="planner-shell" id="appShell" data-page="appointments" hidden>
      <header class="app-header">
        <div>
          <p class="eyebrow">Familieplanning</p>
          <h1>Afspraken</h1>
        </div>
        <a class="reader-link" href="mama.html">Voor mama</a>
      </header>

      <nav class="app-nav" aria-label="Beheer">
        <a href="index.html">Overzicht</a>
        <a class="active" href="afspraken.html">Afspraken</a>
        <a href="mensen.html">Mensen</a>
      </nav>

      <section class="section-header">
        <div>
          <p class="eyebrow">Beheer</p>
          <h2>Afspraken plannen</h2>
        </div>
        <button class="secondary-button" id="resetButton" type="button">
          Nieuwe afspraak
        </button>
      </section>

      <section class="appointments-layout">
        <section class="appointments-panel" aria-label="Afspraken">
          <div
            class="segmented-control compact-filter"
            role="group"
            aria-label="Filter afspraken"
          >
            <button class="segment active" data-filter="upcoming" type="button">
              Komend
            </button>
            <button class="segment" data-filter="history" type="button">
              Geschiedenis
            </button>
            <button class="segment" data-filter="all" type="button">
              Alle
            </button>
            <button class="segment" data-filter="period" type="button">
              Periode
            </button>
          </div>
          <div class="period-filter" id="periodFilter" hidden>
            <label>
              Van
              <input id="periodStartInput" name="periodStart" type="date" />
            </label>
            <label>
              Tot
              <input id="periodEndInput" name="periodEnd" type="date" />
            </label>
            <button
              class="link-button period-clear-button"
              id="clearPeriodButton"
              type="button"
            >
              Wis periode
            </button>
          </div>
          <div class="appointment-list" id="appointmentList"></div>
        </section>

        <form class="appointment-form edit-panel" id="appointmentForm">
          <input id="appointmentId" type="hidden" />
          <h3 id="formTitle">Afspraak toevoegen</h3>

          <label>
            Type afspraak
            <select id="titleInput" name="title" required>
              <option value="" disabled selected>Kies een type</option>
              <option value="Behandeling">Behandeling</option>
              <option value="Controle">Controle</option>
              <option value="Intake">Intake</option>
              <option value="Onderzoek">Onderzoek</option>
              <option value="Telefonisch consult">Telefonisch consult</option>
              <option value="Uitslag">Uitslag</option>
            </select>
          </label>

          <div class="field-grid">
            <label>
              Datum
              <input id="dateInput" name="date" type="date" required />
            </label>
            <label>
              Tijd
              <input id="timeInput" name="time" type="time" />
            </label>
          </div>

          <label>
            Waarom is deze afspraak?
            <input id="reasonInput" name="reason" type="text" />
          </label>

          <label>
            Ziekenhuis
            <select id="hospitalInput" name="hospital" required>
              <option value="" disabled selected>Kies een ziekenhuis</option>
              <option value="Antoni van Leeuwenhoek">
                Antoni van Leeuwenhoek
              </option>
              <option value="St. Antonius Leidsche Rijn">
                St. Antonius Leidsche Rijn
              </option>
              <option value="St. Antonius Nieuwegein">
                St. Antonius Nieuwegein
              </option>
              <option value="UMCU">UMCU</option>
            </select>
          </label>

          <label>
            Locatie of afdeling
            <input id="locationInput" name="location" type="text" />
          </label>

          <label>
            Behandelaar
            <input id="doctorInput" name="doctor" type="text" />
          </label>

          <fieldset class="attendance-fieldset">
            <legend>Wie gaat mee?</legend>
            <div class="attendance-editor" id="attendanceEditor"></div>
          </fieldset>

          <label>
            Praktische notities
            <textarea id="notesInput" name="notes" rows="4"></textarea>
          </label>

          <button class="primary-button" type="submit">Afspraak opslaan</button>
        </form>
      </section>
    </main>

    <template id="appointmentTemplate">
      <article class="appointment-card">
        <div class="card-summary">
          <div>
            <p class="date-line"></p>
            <h3></h3>
            <p class="summary-line"></p>
          </div>
          <button class="secondary-button details-toggle" type="button">
            Details tonen
          </button>
        </div>
        <div class="card-details">
          <dl></dl>
          <div class="attendance-summary"></div>
          <p class="notes"></p>
          <div class="card-actions">
            <button class="icon-button edit-button" type="button">
              Bewerken
            </button>
            <button class="icon-button delete-button" type="button">
              Verwijderen
            </button>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
