<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zorgplanner voor mama</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="reader-body">
    <section class="access-shell" id="accessShell" aria-labelledby="accessTitle">
      <form class="access-panel reader-access" id="accessForm">
        <h1 id="accessTitle">Wachtwoord</h1>
        <label>
          Wachtwoord
          <input id="passwordInput" name="password" type="password" required />
        </label>
        <p class="access-message" id="accessMessage" role="status"></p>
        <button class="primary-button" id="accessSubmit" type="submit">
          Openen
        </button>
      </form>
    </section>

    <main class="mama-page standalone" id="appShell" data-page="reader" hidden>
      <a class="back-link" href="index.html">Terug naar beheer</a>
      <a class="reader-phone-link" href="#readerPhoneSection">
        Belangrijke telefoonnummers
      </a>
      <p>Voor mama</p>
      <h1>Komende afspraken</h1>
      <section
        class="reader-appointment-list"
        id="readerAppointmentList"
        aria-label="Komende afspraken"
      ></section>
      <section
        class="reader-phone-section"
        id="readerPhoneSection"
        aria-label="Belangrijke telefoonnummers"
      >
        <h1>Belangrijke telefoonnummers</h1>
        <div id="readerPhoneRecommendation"></div>
        <div class="reader-phone-list" id="readerPhoneList"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
